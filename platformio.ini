; PlatformIO Configuration for CrawlBand
; Board: ESP-WROOM-32 (ESP32 Dev Module)

; ── WebSocket Actuator Server (唯一实验固件) ─────────────────
[env:ws_server]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
board_build.partitions = huge_app.csv
build_flags =
    -D CORE_DEBUG_LEVEL=3
lib_deps =
    bblanchon/ArduinoJson@^7
    links2004/WebSockets@^2.4.1
build_src_filter = -<*> +<ws_server.cpp>
